<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Class 6-7 Algebra Quiz</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .quiz-container{
        width:100%;
        max-width:700px;
        background:#1e293b;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#38bdf8;
    }

    .question-number{
        margin-bottom:10px;
        color:#94a3b8;
    }

    .question{
        font-size:24px;
        margin-bottom:20px;
        line-height:1.5;
    }

    .options{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .option{
        background:#334155;
        padding:15px;
        border-radius:12px;
        cursor:pointer;
        transition:0.3s;
        border:2px solid transparent;
    }

    .option:hover{
        background:#475569;
    }

    .option.selected{
        border-color:#38bdf8;
        background:#0ea5e9;
    }

    button{
        margin-top:25px;
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        background:#38bdf8;
        color:white;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#0ea5e9;
    }

    .result{
        text-align:center;
    }

    .result h2{
        margin-bottom:20px;
        color:#22c55e;
    }

    .score-box{
        background:#334155;
        padding:20px;
        border-radius:15px;
        margin-bottom:25px;
    }

    .answer-sheet{
        text-align:left;
        margin-top:20px;
    }

    .answer-item{
        background:#334155;
        padding:15px;
        margin-bottom:15px;
        border-radius:12px;
    }

    .correct{
        color:#22c55e;
    }

    .wrong{
        color:#ef4444;
    }
</style>
</head>
<body>

<div class="quiz-container">

    <h1>Class 6-7 Algebra Quiz</h1>

    <div id="quiz-box">

        <div class="question-number" id="question-number"></div>

        <div class="question" id="question"></div>

        <div class="options" id="options"></div>

        <button onclick="submitAnswer()">Submit</button>

    </div>

</div>

<script>

const quizData = [

{
question: "If x = 4, what is the value of 2x + 5 ?",
options: ["10", "11", "12", "13"],
answer: "13"
},

{
question: "a + 7 = 15 হলে a এর মান কত?",
options: ["6", "7", "8", "9"],
answer: "8"
},

{
question: "3y = 21 হলে y এর মান কত?",
options: ["6", "7", "8", "9"],
answer: "7"
},

{
question: "12 - b = 5 হলে b এর মান কত?",
options: ["5", "6", "7", "8"],
answer: "7"
},

{
question: "5m = 35 হলে m এর মান কত?",
options: ["5", "6", "7", "8"],
answer: "7"
},

{
question: "2x + 3 = 11 হলে x এর মান কত?",
options: ["3", "4", "5", "6"],
answer: "4"
},

{
question: "একটি সংখ্যার দ্বিগুণ 18। সংখ্যাটি কত?",
options: ["7", "8", "9", "10"],
answer: "9"
},

{
question: "4p = 2p + 10 হলে p এর মান কত?",
options: ["3", "4", "5", "6"],
answer: "5"
},

{
question: "7x - 9 = 26 হলে x এর মান কত?",
options: ["4", "5", "6", "7"],
answer: "5"
},

{
question: "3(a+2)=18 হলে a এর মান কত?",
options: ["2", "3", "4", "5"],
answer: "4"
}

];

let currentQuestion = 0;
let score = 0;
let selectedOption = null;
let userAnswers = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const questionNumberEl = document.getElementById("question-number");
const quizBox = document.getElementById("quiz-box");

function loadQuestion(){

    selectedOption = null;

    const currentQuiz = quizData[currentQuestion];

    questionNumberEl.innerText =
    `Question ${currentQuestion + 1} of ${quizData.length}`;

    questionEl.innerText = currentQuiz.question;

    optionsEl.innerHTML = "";

    currentQuiz.options.forEach(option => {

        const div = document.createElement("div");

        div.classList.add("option");

        div.innerText = option;

        div.onclick = () => selectOption(div, option);

        optionsEl.appendChild(div);

    });

}

function selectOption(element, option){

    document.querySelectorAll(".option").forEach(el => {
        el.classList.remove("selected");
    });

    element.classList.add("selected");

    selectedOption = option;
}

function submitAnswer(){

    if(selectedOption === null){
        alert("Please select an answer!");
        return;
    }

    const correctAnswer = quizData[currentQuestion].answer;

    userAnswers.push({
        question: quizData[currentQuestion].question,
        selected: selectedOption,
        correct: correctAnswer
    });

    if(selectedOption === correctAnswer){
        score++;
    }

    currentQuestion++;

    if(currentQuestion < quizData.length){
        loadQuestion();
    }else{
        showResult();
    }

}

function showResult(){

    let wrong = quizData.length - score;
    let percentage = (score / quizData.length) * 100;

    let answerHTML = "";

    userAnswers.forEach((item, index) => {

        const isCorrect = item.selected === item.correct;

        answerHTML += `
        <div class="answer-item">
            <h3>Q${index + 1}: ${item.question}</h3>

            <p>
            Your Answer:
            <span class="${isCorrect ? 'correct' : 'wrong'}">
            ${item.selected}
            </span>
            </p>

            <p>
            Correct Answer:
            <span class="correct">
            ${item.correct}
            </span>
            </p>
        </div>
        `;
    });

    quizBox.innerHTML = `
    <div class="result">

        <h2>Quiz Completed!</h2>

        <div class="score-box">

            <h3>Total Questions: ${quizData.length}</h3>
            <h3>Correct Answers: ${score}</h3>
            <h3>Wrong Answers: ${wrong}</h3>
            <h3>Marks: ${percentage}%</h3>

        </div>

        <div class="answer-sheet">

            <h2>Answer Sheet</h2>

            ${answerHTML}

        </div>

    </div>
    `;
}

loadQuestion();

</script>

</body>
</html>
