<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>বল বল বিদ্যুৎ</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #141e30, #243b55);
      font-family: Arial, sans-serif;
      overflow:hidden;
    }

    .card{
      width:360px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius:25px;
      padding:35px;
      text-align:center;
      box-shadow:0 10px 35px rgba(0,0,0,0.4);
      animation: popup 0.7s ease;
      color:white;
    }

    @keyframes popup{
      from{
        opacity:0;
        transform:scale(0.7);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    .gif{
      width:200px;
      border-radius:20px;
      margin-bottom:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    h1{
      font-size:28px;
      line-height:1.5;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:14px 25px;
      border-radius:50px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .yes{
      background:#00ff99;
      color:black;
    }

    .definitely{
      background:#ffd700;
      color:black;
    }

    button:hover{
      transform:scale(1.1);
    }

    .creator{
      margin-top:22px;
      font-size:14px;
      opacity:0.8;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- GIF -->
    <img
      class="gif"
      src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUydjlqMTR0cnEyOWQ1MnJxaHl6MzFpcHE4ZzFlOW15ZzZlb3BmMWVvYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/jumeJnIWzLb6m9a025/giphy.gif"
      alt="gif"
    >

    <h1>
      বল বল বিদ্যুৎ 😏<br>
      গ্রক দিবি কিনা বল
    </h1>

    <div class="buttons">

      <button class="yes"
        onclick="showMessage('Yes 😎')">
        Yes
      </button>

      <button class="definitely"
        onclick="showMessage('Definitely Yes 🔥')">
        Definitely Yes
      </button>

    </div>

    <div class="creator">
      Created by Dinar
    </div>

  </div>

  <script>
    function showMessage(text){
      alert("তুই সঠিক উত্তর দিছস 😆\n" + text);
    }
  </script>

</body>
</html>
