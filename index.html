<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Notes App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.logo{
    font-size:28px;
    font-weight:700;
}

.logo span{
    color:#38bdf8;
}

.search{
    width:100%;
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    border:none;
    outline:none;
    background:#334155;
    color:white;
    border-radius:12px;
    padding:14px;
    margin-top:10px;
    font-size:15px;
}

textarea{
    min-height:140px;
    resize:vertical;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    margin-top:12px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.btn-primary{
    background:#38bdf8;
    color:black;
}

.btn-danger{
    background:#ef4444;
    color:white;
}

.btn-edit{
    background:#22c55e;
    color:black;
}

.notes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}

.note{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    position:relative;
    border:1px solid #334155;
}

.note h3{
    margin-bottom:10px;
    font-size:20px;
    word-break:break-word;
}

.note p{
    color:#cbd5e1;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
}

.note-date{
    margin-top:14px;
    font-size:12px;
    color:#94a3b8;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.empty{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

@media(max-width:600px){

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .logo{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">
            My<span>Notes</span>
        </div>
    </div>

    <div class="search">
        <input 
            type="text"
            id="searchInput"
            placeholder="Search notes..."
            onkeyup="renderNotes()"
        >
    </div>

    <div class="card">

        <h2 id="formTitle">Create Note</h2>

        <input 
            type="text"
            id="noteTitle"
            placeholder="Note title"
        >

        <textarea
            id="noteContent"
            placeholder="Write your note..."
        ></textarea>

        <button 
            class="btn-primary"
            onclick="saveNote()"
        >
            Save Note
        </button>

    </div>

    <div id="notesContainer" class="notes-grid"></div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

let editIndex = null;

function saveToLocal(){

    localStorage.setItem(
        "notes",
        JSON.stringify(notes)
    );
}

function saveNote(){

    const title = document
        .getElementById("noteTitle")
        .value.trim();

    const content = document
        .getElementById("noteContent")
        .value.trim();

    if(title === "" || content === ""){

        alert("Please fill all fields");

        return;
    }

    const noteData = {

        title:title,

        content:content,

        date:new Date().toLocaleString()
    };

    if(editIndex === null){

        notes.unshift(noteData);

    }else{

        notes[editIndex] = noteData;

        editIndex = null;

        document.getElementById(
            "formTitle"
        ).innerText = "Create Note";
    }

    saveToLocal();

    document.getElementById(
        "noteTitle"
    ).value = "";

    document.getElementById(
        "noteContent"
    ).value = "";

    renderNotes();
}

function renderNotes(){

    const container = document.getElementById(
        "notesContainer"
    );

    const search = document
        .getElementById("searchInput")
        .value.toLowerCase();

    container.innerHTML = "";

    const filtered = notes.filter(note =>

        note.title.toLowerCase().includes(search)

        ||

        note.content.toLowerCase().includes(search)
    );

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="empty">
                No notes found
            </div>
        `;

        return;
    }

    filtered.forEach((note,index)=>{

        const div = document.createElement("div");

        div.className = "note";

        div.innerHTML = `

            <h3>${note.title}</h3>

            <p>${note.content}</p>

            <div class="note-date">
                ${note.date}
            </div>

            <div class="actions">

                <button 
                    class="btn-edit"
                    onclick="editNote(${index})"
                >
                    Edit
                </button>

                <button 
                    class="btn-danger"
                    onclick="deleteNote(${index})"
                >
                    Delete
                </button>

            </div>
        `;

        container.appendChild(div);
    });
}

function editNote(index){

    const note = notes[index];

    document.getElementById(
        "noteTitle"
    ).value = note.title;

    document.getElementById(
        "noteContent"
    ).value = note.content;

    document.getElementById(
        "formTitle"
    ).innerText = "Edit Note";

    editIndex = index;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

function deleteNote(index){

    const confirmDelete = confirm(
        "Delete this note?"
    );

    if(confirmDelete){

        notes.splice(index,1);

        saveToLocal();

        renderNotes();
    }
}

renderNotes();

</script>

</body>
</html>
