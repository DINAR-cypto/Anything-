<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Notes App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    gap:10px;
    flex-wrap:wrap;
}

.logo{
    font-size:28px;
    font-weight:700;
}

.logo span{
    color:#38bdf8;
}

.top-buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.btn-primary{
    background:#38bdf8;
    color:black;
}

.btn-danger{
    background:#ef4444;
    color:white;
}

.btn-edit{
    background:#22c55e;
    color:black;
}

.btn-gray{
    background:#334155;
    color:white;
}

.search{
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:18px;
    margin-bottom:25px;
    border:1px solid #334155;
}

.card h2{
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    margin-top:10px;
    font-size:15px;
    outline:none;
}

textarea{
    min-height:150px;
    resize:vertical;
}

.notes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}

.note{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    border:1px solid #334155;
}

.note h3{
    margin-bottom:12px;
    font-size:20px;
    word-break:break-word;
}

.note p{
    color:#cbd5e1;
    line-height:1.7;
    white-space:pre-wrap;
    word-break:break-word;
}

.note-date{
    margin-top:14px;
    color:#94a3b8;
    font-size:12px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
}

.empty{
    text-align:center;
    padding:50px;
    color:#94a3b8;
}

.badge{
    background:#22c55e;
    color:black;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.hidden{
    display:none;
}

@media(max-width:600px){

    .logo{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            My<span>Notes</span>
        </div>

        <div class="top-buttons">

            <div id="adminBadge" class="badge hidden">
                Admin Mode
            </div>

            <button 
                class="btn-gray"
                onclick="loginAdmin()"
            >
                Admin Login
            </button>

            <button 
                class="btn-danger hidden"
                id="logoutBtn"
                onclick="logoutAdmin()"
            >
                Logout
            </button>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="search">

        <input
            type="text"
            id="searchInput"
            placeholder="Search notes..."
            onkeyup="renderNotes()"
        >

    </div>

    <!-- NOTE FORM -->

    <div 
        class="card hidden"
        id="noteFormCard"
    >

        <h2 id="formTitle">
            Create Note
        </h2>

        <input
            type="text"
            id="noteTitle"
            placeholder="Note title"
        >

        <textarea
            id="noteContent"
            placeholder="Write your note..."
        ></textarea>

        <button
            class="btn-primary"
            onclick="saveNote()"
        >
            Save Note
        </button>

    </div>

    <!-- NOTES -->

    <div 
        id="notesContainer"
        class="notes-grid"
    ></div>

</div>

<script>

const ADMIN_PASSWORD = "1234";

let isAdmin = false;

let notes = JSON.parse(
    localStorage.getItem("notes")
) || [];

let editIndex = null;

function saveLocal(){

    localStorage.setItem(
        "notes",
        JSON.stringify(notes)
    );
}

function loginAdmin(){

    const pass = prompt(
        "Enter Admin Password"
    );

    if(pass === ADMIN_PASSWORD){

        isAdmin = true;

        document.getElementById(
            "noteFormCard"
        ).classList.remove("hidden");

        document.getElementById(
            "logoutBtn"
        ).classList.remove("hidden");

        document.getElementById(
            "adminBadge"
        ).classList.remove("hidden");

        alert("Admin Login Success");

        renderNotes();

    }else{

        alert("Wrong Password");
    }
}

function logoutAdmin(){

    isAdmin = false;

    document.getElementById(
        "noteFormCard"
    ).classList.add("hidden");

    document.getElementById(
        "logoutBtn"
    ).classList.add("hidden");

    document.getElementById(
        "adminBadge"
    ).classList.add("hidden");

    renderNotes();
}

function saveNote(){

    const title = document
        .getElementById("noteTitle")
        .value.trim();

    const content = document
        .getElementById("noteContent")
        .value.trim();

    if(title === "" || content === ""){

        alert("Fill all fields");

        return;
    }

    const data = {

        title:title,

        content:content,

        date:new Date().toLocaleString()
    };

    if(editIndex === null){

        notes.unshift(data);

    }else{

        notes[editIndex] = data;

        editIndex = null;

        document.getElementById(
            "formTitle"
        ).innerText = "Create Note";
    }

    saveLocal();

    document.getElementById(
        "noteTitle"
    ).value = "";

    document.getElementById(
        "noteContent"
    ).value = "";

    renderNotes();
}

function renderNotes(){

    const container = document
        .getElementById("notesContainer");

    const search = document
        .getElementById("searchInput")
        .value.toLowerCase();

    container.innerHTML = "";

    const filtered = notes.filter(note =>

        note.title.toLowerCase()
        .includes(search)

        ||

        note.content.toLowerCase()
        .includes(search)
    );

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="empty">
                No Notes Found
            </div>
        `;

        return;
    }

    filtered.forEach((note,index)=>{

        const div = document.createElement("div");

        div.className = "note";

        let adminButtons = "";

        if(isAdmin){

            adminButtons = `

                <div class="actions">

                    <button
                        class="btn-edit"
                        onclick="editNote(${index})"
                    >
                        Edit
                    </button>

                    <button
                        class="btn-danger"
                        onclick="deleteNote(${index})"
                    >
                        Delete
                    </button>

                </div>
            `;
        }

        div.innerHTML = `

            <h3>${note.title}</h3>

            <p>${note.content}</p>

            <div class="note-date">
                ${note.date}
            </div>

            ${adminButtons}
        `;

        container.appendChild(div);
    });
}

function editNote(index){

    const note = notes[index];

    document.getElementById(
        "noteTitle"
    ).value = note.title;

    document.getElementById(
        "noteContent"
    ).value = note.content;

    document.getElementById(
        "formTitle"
    ).innerText = "Edit Note";

    editIndex = index;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

function deleteNote(index){

    const ok = confirm(
        "Delete this note?"
    );

    if(ok){

        notes.splice(index,1);

        saveLocal();

        renderNotes();
    }
}

renderNotes();

</script>

</body>
</html>
