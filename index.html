<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funny MCQ Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    margin-bottom:20px;
}

.title h1{
    color:#38bdf8;
    margin-bottom:10px;
}

.title p{
    color:#cbd5e1;
}

.image-box{
    text-align:center;
    margin-bottom:20px;
}

.image-box img{
    width:100%;
    max-height:400px;
    object-fit:cover;
    border-radius:15px;
}

.question-number{
    color:#94a3b8;
    margin-bottom:10px;
}

.question{
    font-size:24px;
    margin-bottom:20px;
    line-height:1.5;
}

.options{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.option{
    background:#334155;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.option:hover{
    background:#475569;
}

.option.selected{
    background:#0ea5e9;
    border-color:#38bdf8;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.result{
    text-align:center;
}

.correct{
    color:#22c55e;
}

.wrong{
    color:#ef4444;
}

.credit{
    text-align:center;
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

.credit span{
    color:#38bdf8;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>Funny MCQ Quiz</h1>
        <p>Select the correct answer and enjoy 😎</p>
    </div>

    <div id="quiz-box">

        <div class="image-box">
            <img src="photo.jpg" alt="Quiz Image">
        </div>

        <div class="question-number" id="question-number"></div>

        <div class="question" id="question"></div>

        <div class="options" id="options"></div>

        <button onclick="submitAnswer()">
            Submit Answer
        </button>

    </div>

    <div class="credit">
        Developed by <span>Dinar</span>
    </div>

</div>

<script>

const quizData = [

{
question:"এই ব্যক্তি তার নাম কি?",
options:[
"শুধু আনাস",
"কচি আনাস 😎"
],
answer:"কচি আনাস 😎"
},

{
question:"তার ফেমাস ডায়ালগ কোনটি?",
options:[
"ভাই আমি গেমে আসতেছি",
"ভাই কারেন্ট নাই ,এখন গেম খেলতে পারবো না 😶"
],
answer:"ভাই কারেন্ট নাই ,এখন গেম খেলতে পারবো না 😶"
}

];

let currentQuestion = 0;
let score = 0;
let selectedOption = null;

const questionEl =
document.getElementById("question");

const optionsEl =
document.getElementById("options");

const questionNumberEl =
document.getElementById("question-number");

const quizBox =
document.getElementById("quiz-box");

function loadQuestion(){

    selectedOption = null;

    const currentQuiz =
    quizData[currentQuestion];

    questionNumberEl.innerHTML =
    "Question " +
    (currentQuestion + 1)
    + " of " +
    quizData.length;

    questionEl.innerHTML =
    currentQuiz.question;

    optionsEl.innerHTML = "";

    currentQuiz.options.forEach(option=>{

        const div =
        document.createElement("div");

        div.classList.add("option");

        div.innerHTML = option;

        div.onclick = ()=>{
            selectOption(div,option);
        };

        optionsEl.appendChild(div);

    });

}

function selectOption(element,option){

    document.querySelectorAll(".option")
    .forEach(el=>{
        el.classList.remove("selected");
    });

    element.classList.add("selected");

    selectedOption = option;
}

function submitAnswer(){

    if(selectedOption === null){

        alert("Please select an answer!");

        return;
    }

    const correctAnswer =
    quizData[currentQuestion].answer;

    if(selectedOption === correctAnswer){
        score++;
    }

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        showResult();
    }

}

function showResult(){

    let wrong =
    quizData.length - score;

    let percentage =
    ((score / quizData.length) * 100)
    .toFixed(0);

    quizBox.innerHTML = `

    <div class="result">

        <h1>Quiz Completed 😎</h1>

        <br>

        <h2 class="correct">
            Correct Answers: ${score}
        </h2>

        <br>

        <h2 class="wrong">
            Wrong Answers: ${wrong}
        </h2>

        <br>

        <h2>
            Final Score: ${percentage}%
        </h2>

        <button onclick="location.reload()">
            Restart Quiz
        </button>

    </div>

    `;
}

loadQuestion();

</script>

</body>
</html>
